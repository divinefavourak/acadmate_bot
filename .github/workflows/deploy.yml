name: Deploy

# Continuous deployment to the HackClub server. On every push to main (i.e. a
# merged PR) the test suite runs first; only if it's green do we SSH in and
# deploy. `workflow_dispatch` lets you trigger a deploy by hand from the Actions
# tab. The concurrency group prevents two deploys from racing.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          # Optional: pin the server's host key for strict verification. If
          # unset, we fall back to a one-time keyscan (still enforced).
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          if [ -n "${SSH_KNOWN_HOSTS:-}" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts
          # Deterministic update (reset, not pull), then rebuild the shared image
          # BEFORE migrate so a newly-added migration is present, apply
          # migrations, and recreate the services.
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            "set -e; cd ~/acadmate_bot \
              && git fetch origin main \
              && git reset --hard origin/main \
              && docker compose build bot api migrate \
              && docker compose run --rm migrate npx prisma migrate deploy \
              && docker compose up -d bot api \
              && docker compose ps"
