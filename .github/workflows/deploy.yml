name: Deploy

# Continuous deployment to the HackClub server. On every push to main (i.e. a
# merged PR) the test suite runs first; only if it's green do we SSH in and
# deploy. `workflow_dispatch` lets you trigger a deploy by hand from the Actions
# tab. The concurrency group prevents two deploys from racing.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          # Rebuild the shared image (covers migrate/bot/api) so a newly-added
          # migration is present, apply migrations, then recreate the services.
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new \
            "$SSH_USER@$SSH_HOST" \
            "set -e; cd ~/acadmate_bot \
              && git pull origin main \
              && docker compose build bot api migrate \
              && docker compose run --rm migrate npx prisma migrate deploy \
              && docker compose up -d bot api \
              && docker compose ps"
